[workspace]
resolver = "3"
members = ["crates/baton-core"]

# The full crate layout (see docs/ARCHITECTURE.md §10) adds baton-model,
# baton-providers, baton-host, baton-cli, baton-wasm, baton-py, baton-js,
# baton-plugin-abi and baton-replay over later phases. Phase 0 ships only the
# pure, sans-IO brain: `baton-core`.

[workspace.package]
version = "0.0.0"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/baton-rs/baton"
rust-version = "1.85"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Release profile leaning toward the "tiny footprint" goal (ARCHITECTURE §11).
# NOTE: `panic = "abort"` is intentionally NOT set here — it conflicts with the
# unwinding test harness (`cargo test --release`). It belongs in a WASM-specific
# profile in Phase 4, where module size is actually validated.
[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
