name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace --all-targets

  rust-agent-examples:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - huglet-datasmith
          - huglet-docs
          - huglet-insights
          - huglet-weather
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build ${{ matrix.example }} agent
        run: cargo run -p huggr-toolkit --bin huggr -- build examples/${{ matrix.example }}

  chrome-extension-example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli
      - name: Build Chrome extension
        run: ./examples/chrome-extension/build.sh

  # The Python runtime API: build the wheel with maturin and run the pytest
  # suite against the mock provider (crates/huggr-python sits outside the
  # workspace, so the main test job never needs Python).
  python-bindings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/huggr-python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test huggr-python crate
        run: cargo test --manifest-path crates/huggr-python/Cargo.toml --all-targets
      - name: Build and test huggr-agents
        working-directory: bindings/python
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install maturin pytest
          maturin develop --release
          python -m pytest tests -q

  # The TypeScript runtime API: build the wasm brain, compile the typed
  # package, run the node test suite against the mock provider.
  typescript-bindings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build and test huggr-agents (TS)
        working-directory: bindings/typescript
        run: |
          npm install
          npm run build:wasm
          npm test

  # The sans-IO canary: huggr-core must build with no environmental deps
  # (no tokio/reqwest/fs), which a wasm target enforces at compile time.
  sans-io-canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build huggr-core for wasm32
        run: cargo build --target wasm32-unknown-unknown -p huggr-core
