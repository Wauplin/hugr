name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  # The Python runtime API: build the wheel with maturin and run the pytest
  # suite against the mock provider (crates/hugr-python sits outside the
  # workspace, so the main test job never needs Python).
  python-bindings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/hugr-python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and test hugr-agents
        working-directory: bindings/python
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install maturin pytest
          maturin develop --release
          python -m pytest tests -q

  # The sans-IO canary: hugr-core must build with no environmental deps
  # (no tokio/reqwest/fs), which a wasm target enforces at compile time.
  sans-io-canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build hugr-core for wasm32
        run: cargo build --target wasm32-unknown-unknown -p hugr-core
