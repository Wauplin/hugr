name: Publish huglet-docs to PyPI

# Manual release of the huglet-docs typed Python wheel, published with PyPI
# trusted publishing (OIDC, no API token). Register this workflow as the
# project's trusted publisher on PyPI with environment `pypi`.
#
# The native extension is abi3-py39, so a single wheel covers all Python >=3.9.
# It is built inside a manylinux_2_28 image so the wheel is tagged for an older
# glibc and installs across most Linux distros; building on ubuntu-latest tags
# manylinux_2_39, which is too new for most systems. Everything (compiling the
# huggr CLI and running maturin) happens in the same container so the generated
# project's absolute path dependency stays consistent.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install maturin
        run: /opt/python/cp312-cp312/bin/pip install maturin
      - name: Build wheel
        run: |
          export PATH="/opt/python/cp312-cp312/bin:$PATH"
          cargo run -p huggr-toolkit --bin huggr -- build examples/huglet-docs --surface python --release
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: examples/huglet-docs/dist/huglet-docs-python/target/wheels/*.whl
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
