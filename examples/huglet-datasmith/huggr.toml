# Huggr agent definition — edit, then run with:
#   huglet-datasmith <docs_path> "<question>"   (a built binary)
#   huggr run . <docs_path> "<question>"       (from this folder)
# The first `huggr` run creates ~/.huggr/models.toml. Set the key named there.

[agent]
name = "huglet-datasmith"
version = "0.1.0"
description = "Mines a documentation folder and synthesizes grounded Q&A evaluation pairs."

[models]
default = "powerful"

# Read-only filesystem access, jailed to the docs folder passed at run time.
[tools.fs_read]
root = "."

[runtime.args.docs_path]
target = "tools.fs_read.root"
positional = true
required = true
env = "HUGGR_DATASMITH_DOCS"
help = "Folder containing the documentation to mine for Q&A pairs."
