skills = ["skills/source-citation"]

[agent]
name = "huglet-docs"
version = "0.0.2"
description = "Answers questions from a read-only documentation folder."

[models]
default = "powerful"

[tools.fs_read]
root = "."

[runtime.args.docs_path]
target = "tools.fs_read.root"
positional = true
required = true
env = "HUGGR_DOCS_PATH"
help = "Folder containing the documentation to search."
