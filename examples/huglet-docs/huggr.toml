skills = ["skills/source-citation"]

[agent]
name = "huglet-docs"
version = "0.0.3"
description = "Answers questions from a read-only documentation folder."

[models]
default = "capable"

# One named root; the runtime arg fills in its path. Files are addressed as
# `docs/<path>` in tool calls.
[tools.fs_read]
root = [{ name = "docs", path = "." }]

[runtime.args.docs_path]
target = "tools.fs_read.root"
positional = true
required = true
env = "HUGGR_DOCS_PATH"
help = "Folder containing the documentation to search."
