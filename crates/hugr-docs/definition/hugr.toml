[agent]
name = "hugr-docs"
version = "0.0.2"
description = "Answers questions from a read-only documentation folder."

[models]
base_url = "https://router.huggingface.co/v1"
api_key_env = "HUGR_DOCS_API_KEY"
default = "docs"

[models.docs]
model = "google/gemma-4-31B-it:cerebras"
input_usd_per_m_tokens = 1.0
output_usd_per_m_tokens = 1.5
temperature = 0.0

[tools.fs_read]
root = "."

[runtime.args.docs_path]
target = "tools.fs_read.root"
positional = true
required = true
env = "HUGR_DOCS_PATH"
help = "Folder containing the documentation to search."

[response]
rust_type = "hugr_docs::DocsResponse"
crate_path = ".."
crate_package = "hugr-docs"
schema_name = "hugr_docs_response"
max_attempts = 3

[traces]
store = ".hugr-docs-traces"
